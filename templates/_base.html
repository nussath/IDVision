<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IDVision{% endblock %}</title>
    {% macro navbar(user, is_admin, active) %}
    <header class="topbar">
        <h1>IDVision</h1>
        <div class="who">
            {{ user.username }}
            <span class="pill {{ user.role }}">{{ user.role }}</span>
            <a href="/logout">Logout</a>
        </div>
    </header>
    <nav class="mainnav">
        <a href="/dashboard" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
        <a href="/camera"    class="{{ 'active' if active == 'camera' }}">Live camera</a>
        <a href="/criminals" class="{{ 'active' if active == 'criminals' }}">Criminals</a>
        <a href="/missing"   class="{{ 'active' if active == 'missing' }}">Missing</a>
        <a href="/alerts"    class="{{ 'active' if active == 'alerts' }}">Alerts</a>
        {% if is_admin %}
        <a href="/admin"     class="{{ 'active' if active == 'admin' }}">Admin</a>
        {% endif %}
    </nav>
    {% endmacro %}
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --border: #2a2f3a;
            --text: #e6e8eb;
            --muted: #8b93a7;
            --accent: #4f8cff;
            --danger: #ff5a5f;
            --warn: #ffb224;
            --ok: #3ecf8e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header.topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        header.topbar h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.5px;
        }
        header.topbar .who { color: var(--muted); font-size: 14px; }
        header.topbar a {
            color: var(--accent);
            text-decoration: none;
            margin-left: 16px;
        }
        header.topbar a:hover { text-decoration: underline; }
        nav.mainnav {
            background: #11141a;
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
        }
        nav.mainnav a {
            padding: 12px 14px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        nav.mainnav a:hover { color: var(--text); }
        nav.mainnav a.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 20px;
        }
        .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
        }
        .card h2 { margin: 0 0 12px; font-size: 16px; color: var(--text); }
        .card.subtle h2 { color: var(--muted); }
        .feed-frame {
            width: 100%;
            border-radius: 6px;
            background: #000;
            display: block;
        }
        form.inline { display: grid; gap: 10px; }
        form.inline input, form.inline select, form.inline button {
            padding: 9px 11px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0b0d11;
            color: var(--text);
            font-size: 14px;
        }
        form.inline button {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        form.inline button:hover { filter: brightness(1.1); }
        form.inline .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--muted); font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        .empty { color: var(--muted); font-style: italic; }
        .pill {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .pill.criminal { background: rgba(255,90,95,0.15); color: var(--danger); }
        .pill.missing  { background: rgba(255,178,36,0.15); color: var(--warn); }
        .pill.viewer   { background: rgba(79,140,255,0.15); color: var(--accent); }
        .pill.admin    { background: rgba(62,207,142,0.15); color: var(--ok); }
        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .flash.err { background: rgba(255,90,95,0.12); color: var(--danger); border: 1px solid rgba(255,90,95,0.3); }
        .flash.ok  { background: rgba(62,207,142,0.12); color: var(--ok);    border: 1px solid rgba(62,207,142,0.3); }
        form.inline-action { display: inline; margin: 0; padding: 0; }
        button.danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(255,90,95,0.35);
            padding: 3px 9px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        button.danger:hover { background: rgba(255,90,95,0.12); }
        .muted { color: var(--muted); font-size: 13px; }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>

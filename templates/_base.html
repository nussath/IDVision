<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IDVision{% endblock %}</title>
    {% macro navbar(user, is_admin, active) %}
    <header class="topbar">
        <h1>IDVision</h1>
        <div class="who">
            {{ user.username }}
            <span class="pill {{ user.role }}">{{ user.role }}</span>
            <a href="/logout">Logout</a>
        </div>
    </header>
    <nav class="mainnav">
        <a href="/dashboard" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
        <a href="/camera"    class="{{ 'active' if active == 'camera' }}">Live camera</a>
        <a href="/criminals" class="{{ 'active' if active == 'criminals' }}">Criminals</a>
        <a href="/missing"   class="{{ 'active' if active == 'missing' }}">Missing</a>
        <a href="/alerts"    class="{{ 'active' if active == 'alerts' }}">Alerts</a>
        {% if is_admin %}
        <a href="/admin"     class="{{ 'active' if active == 'admin' }}">Admin</a>
        {% endif %}
    </nav>
    {% endmacro %}
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --border: #2a2f3a;
            --text: #e6e8eb;
            --muted: #8b93a7;
            --accent: #4f8cff;
            --danger: #ff5a5f;
            --warn: #ffb224;
            --ok: #3ecf8e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            position: relative;
        }
        a, a:visited {
            color: var(--accent);
        }
        a:hover { text-decoration: underline; }
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.06;
            background-color: var(--bg);
        }
        .bg-overlay svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        header.topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        header.topbar h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0.5px;
        }
        header.topbar .who { color: var(--muted); font-size: 14px; }
        header.topbar a {
            color: var(--accent);
            text-decoration: none;
            margin-left: 16px;
        }
        header.topbar a:hover { text-decoration: underline; }
        nav.mainnav {
            background: #11141a;
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
        }
        nav.mainnav a {
            padding: 12px 14px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }
        nav.mainnav a:hover { color: var(--text); }
        nav.mainnav a.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 20px;
        }
        .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
        }
        .card h2 { margin: 0 0 12px; font-size: 16px; color: var(--text); }
        .card.subtle h2 { color: var(--muted); }
        .feed-frame {
            width: 100%;
            border-radius: 6px;
            background: #000;
            display: block;
        }
        form.inline { display: grid; gap: 10px; }
        form.inline input, form.inline select, form.inline button {
            padding: 9px 11px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0b0d11;
            color: var(--text);
            font-size: 14px;
        }
        form.inline button {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        form.inline button:hover { filter: brightness(1.1); }
        form.inline .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--muted); font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        .empty { color: var(--muted); font-style: italic; }
        .pill {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .pill.criminal { background: rgba(255,90,95,0.15); color: var(--danger); }
        .pill.missing  { background: rgba(255,178,36,0.15); color: var(--warn); }
        .pill.viewer   { background: rgba(79,140,255,0.15); color: var(--accent); }
        .pill.admin    { background: rgba(62,207,142,0.15); color: var(--ok); }
        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .flash.err { background: rgba(255,90,95,0.12); color: var(--danger); border: 1px solid rgba(255,90,95,0.3); }
        .flash.ok  { background: rgba(62,207,142,0.12); color: var(--ok);    border: 1px solid rgba(62,207,142,0.3); }
        form.inline-action { display: inline; margin: 0; padding: 0; }
        button.danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(255,90,95,0.35);
            padding: 3px 9px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        button.danger:hover { background: rgba(255,90,95,0.12); }
        .muted { color: var(--muted); font-size: 13px; }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
    <div class="bg-overlay" aria-hidden="true">
        <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice"
             xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="dotGrid" x="0" y="0" width="40" height="40"
                         patternUnits="userSpaceOnUse">
                    <circle cx="1" cy="1" r="1" fill="#4f8cff"/>
                </pattern>
                <symbol id="faceMesh" viewBox="-110 -140 220 280">
                    <!-- jaw (U-shape) -->
                    <polyline points="-95,-30 -90,20 -78,60 -60,95 -35,120 0,130 35,120 60,95 78,60 90,20 95,-30"
                              fill="none" stroke="#4f8cff" stroke-width="1.2"/>
                    <!-- forehead / hairline arc -->
                    <path d="M -95 -30 Q 0 -135 95 -30"
                          fill="none" stroke="#4f8cff" stroke-width="1.2"/>
                    <!-- left eye -->
                    <ellipse cx="-42" cy="-18" rx="22" ry="10"
                             fill="none" stroke="#4f8cff" stroke-width="1"/>
                    <circle cx="-42" cy="-18" r="4" fill="#4f8cff"/>
                    <!-- right eye -->
                    <ellipse cx="42" cy="-18" rx="22" ry="10"
                             fill="none" stroke="#4f8cff" stroke-width="1"/>
                    <circle cx="42" cy="-18" r="4" fill="#4f8cff"/>
                    <!-- brows -->
                    <path d="M -68 -38 Q -42 -50 -18 -38" fill="none"
                          stroke="#4f8cff" stroke-width="1"/>
                    <path d="M  18 -38 Q  42 -50  68 -38" fill="none"
                          stroke="#4f8cff" stroke-width="1"/>
                    <!-- nose -->
                    <path d="M 0 -18 L -6 35 L 0 42 L 6 35 Z" fill="none"
                          stroke="#4f8cff" stroke-width="1"/>
                    <!-- mouth -->
                    <path d="M -28 72 Q 0 88 28 72" fill="none"
                          stroke="#4f8cff" stroke-width="1"/>
                    <!-- bracket markers (framing a detection box) -->
                    <g stroke="#4f8cff" stroke-width="1.5" fill="none">
                        <path d="M -108 -138 L -108 -118 L -88 -138"/>
                        <path d="M  108 -138 L  108 -118 L  88 -138"/>
                        <path d="M -108  138 L -108  118 L -88  138"/>
                        <path d="M  108  138 L  108  118 L  88  138"/>
                    </g>
                    <!-- landmark dots scattered along face -->
                    <g fill="#4f8cff">
                        <circle cx="-78" cy="22"  r="1.4"/>
                        <circle cx="-60" cy="62"  r="1.4"/>
                        <circle cx="-35" cy="95"  r="1.4"/>
                        <circle cx="0"   cy="105" r="1.4"/>
                        <circle cx="35"  cy="95"  r="1.4"/>
                        <circle cx="60"  cy="62"  r="1.4"/>
                        <circle cx="78"  cy="22"  r="1.4"/>
                        <circle cx="-42" cy="-18" r="1.4"/>
                        <circle cx="42"  cy="-18" r="1.4"/>
                        <circle cx="0"   cy="42"  r="1.4"/>
                        <circle cx="-28" cy="72"  r="1.4"/>
                        <circle cx="28"  cy="72"  r="1.4"/>
                    </g>
                </symbol>
                <symbol id="reticle" viewBox="-60 -60 120 120">
                    <circle r="55" fill="none" stroke="#4f8cff" stroke-width="1.1"/>
                    <circle r="38" fill="none" stroke="#4f8cff" stroke-width="0.8"/>
                    <line x1="-55" y1="0" x2="-20" y2="0" stroke="#4f8cff" stroke-width="0.9"/>
                    <line x1="20"  y1="0" x2="55"  y2="0" stroke="#4f8cff" stroke-width="0.9"/>
                    <line x1="0" y1="-55" x2="0" y2="-20" stroke="#4f8cff" stroke-width="0.9"/>
                    <line x1="0" y1="20"  x2="0" y2="55"  stroke="#4f8cff" stroke-width="0.9"/>
                    <circle r="3" fill="#4f8cff"/>
                </symbol>
            </defs>

            <!-- dotted backdrop -->
            <rect width="100%" height="100%" fill="url(#dotGrid)"/>

            <!-- five face-mesh instances scattered across the viewport -->
            <use href="#faceMesh" x="230"  y="240"/>
            <use href="#faceMesh" x="820"  y="180" transform="translate(820 180) scale(0.7) translate(-820 -180)"/>
            <use href="#faceMesh" x="1380" y="310"/>
            <use href="#faceMesh" x="500"  y="700" transform="translate(500 700) scale(0.6) translate(-500 -700)"/>
            <use href="#faceMesh" x="1150" y="720"/>

            <!-- detection reticles -->
            <use href="#reticle" x="80"   y="560"/>
            <use href="#reticle" x="1500" y="80"/>
            <use href="#reticle" x="980"  y="490"/>

            <!-- faint horizontal scan strips -->
            <g stroke="#4f8cff" stroke-width="0.6" opacity="0.5">
                <line x1="0" y1="80"  x2="1600" y2="80"/>
                <line x1="0" y1="300" x2="1600" y2="300"/>
                <line x1="0" y1="520" x2="1600" y2="520"/>
                <line x1="0" y1="740" x2="1600" y2="740"/>
            </g>
        </svg>
    </div>
    {% block body %}{% endblock %}
</body>
</html>
